# Cloudflare Pages Configuration
name = "apibuilder-ui"
compatibility_date = "2026-02-08"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".svelte-kit/cloudflare"

# Environment variables for production deployment
# Sensitive values (like GITHUB_CLIENT_SECRET) should be set via:
#   wrangler pages secret put VARIABLE_NAME
# Or in Cloudflare Dashboard under Pages → Settings → Environment Variables
[vars]
VITE_API_BASE_URL = "https://api.apibuilder.io"
VITE_APP_BASE_URL = "https://www.apibuilder.org"
VITE_ENVIRONMENT = "production"
# VITE_GITHUB_CLIENT_ID - set in Cloudflare Dashboard (varies per environment)
# GITHUB_CLIENT_SECRET - set via: wrangler pages secret put GITHUB_CLIENT_SECRET
